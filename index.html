<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Networks & Cybersecurity — Interactive Presentation</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #080c14;
    --c-surface: #0f1520;
    --c-surface2: #162030;
    --c-border: #1e3050;
    --c-accent: #00c8ff;
    --c-accent2: #ff6b35;
    --c-accent3: #a78bfa;
    --c-green: #10d9a0;
    --c-red: #ff4757;
    --c-yellow: #ffd32a;
    --c-text: #cdd6f4;
    --c-dim: #6c7a96;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--c-bg); }
  body { font-family: 'Cairo', sans-serif; color: var(--c-text); }

  /* ── GRID BG ── */
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .grid-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 50%, transparent 30%, var(--c-bg) 100%);
  }

  /* ── SLIDES ── */
  #deck { position: fixed; inset: 0; z-index: 1; }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transform: translateX(60px);
    transition: opacity 0.5s cubic-bezier(.4,0,.2,1), transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .slide.active {
    opacity: 1; pointer-events: all; transform: translateX(0);
  }
  .slide.exit-left {
    opacity: 0; transform: translateX(-60px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--c-border);
  }
  .topbar-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--c-accent); letter-spacing: 2px; text-transform: uppercase; }
  .slide-counter { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--c-dim); }
  .slide-counter span { color: var(--c-accent); font-weight: 700; }

  /* ── PROGRESS ── */
  .progress-bar-wrap { position: fixed; top: 52px; left: 0; right: 0; height: 2px; z-index: 100; background: var(--c-border); }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--c-accent), var(--c-accent3)); transition: width 0.4s ease; }

  /* ── BOTTOM NAV ── */
  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0; height: 60px; z-index: 100;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    background: rgba(8,12,20,0.85); backdrop-filter: blur(12px);
    border-top: 1px solid var(--c-border);
  }
  .nav-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 24px; border-radius: 8px; border: 1px solid var(--c-border);
    background: var(--c-surface); color: var(--c-text); font-family: 'Cairo', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { border-color: var(--c-accent); color: var(--c-accent); background: rgba(0,200,255,0.07); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.primary { background: var(--c-accent); color: #080c14; border-color: var(--c-accent); }
  .nav-btn.primary:hover { background: #33d4ff; }

  /* ── DOT NAV ── */
  .dot-nav { display: flex; gap: 6px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c-border); cursor: pointer; transition: all 0.3s; }
  .dot.active { background: var(--c-accent); width: 20px; border-radius: 3px; }
  .dot:hover { background: var(--c-dim); }

  /* ── SLIDE CONTENT AREA ── */
  .slide-inner { flex: 1; overflow: auto; padding: 80px 60px 80px; display: flex; flex-direction: column; justify-content: center; }
  @media (max-width: 900px) { .slide-inner { padding: 70px 24px 70px; } }

  /* ── SECTION BADGE ── */
  .section-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 4px 14px; border-radius: 20px; margin-bottom: 20px;
    font-size: 11px; font-family: 'JetBrains Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
    border: 1px solid; width: fit-content;
  }
  .badge-blue { background: rgba(0,200,255,0.1); border-color: rgba(0,200,255,0.3); color: var(--c-accent); }
  .badge-orange { background: rgba(255,107,53,0.1); border-color: rgba(255,107,53,0.3); color: var(--c-accent2); }
  .badge-purple { background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.3); color: var(--c-accent3); }
  .badge-green { background: rgba(16,217,160,0.1); border-color: rgba(16,217,160,0.3); color: var(--c-green); }
  .badge-red { background: rgba(255,71,87,0.1); border-color: rgba(255,71,87,0.3); color: var(--c-red); }

  /* ── SLIDE TITLE ── */
  .slide-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(28px, 4vw, 48px); color: #fff; line-height: 1.15; margin-bottom: 10px; }
  .slide-title .hl { color: var(--c-accent); }
  .slide-subtitle { font-size: 16px; color: var(--c-dim); margin-bottom: 32px; font-weight: 400; }

  /* ── BULLETS ── */
  .bullets { display: flex; flex-direction: column; gap: 14px; }
  .bullet-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 18px; border-radius: 10px;
    background: var(--c-surface); border: 1px solid var(--c-border);
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.2s, background 0.2s;
  }
  .bullet-item.visible { opacity: 1; transform: translateY(0); }
  .bullet-item:hover { border-color: rgba(0,200,255,0.3); background: rgba(0,200,255,0.04); }
  .bullet-icon { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 14px; margin-top: 1px; }
  .icon-blue { background: rgba(0,200,255,0.15); }
  .icon-orange { background: rgba(255,107,53,0.15); }
  .icon-green { background: rgba(16,217,160,0.15); }
  .icon-red { background: rgba(255,71,87,0.15); }
  .icon-purple { background: rgba(167,139,250,0.15); }
  .bullet-text { font-size: 15px; line-height: 1.6; flex: 1; }
  .bullet-text .en { font-family: 'JetBrains Mono', monospace; color: var(--c-accent); font-size: 13px; font-weight: 700; }
  .bullet-text .warn { color: var(--c-red); font-weight: 700; }
  .bullet-text .good { color: var(--c-green); font-weight: 700; }

  /* ── SPEAKER NOTE ── */
  .speaker-note {
    margin-top: 24px; padding: 12px 18px; border-radius: 8px;
    background: rgba(167,139,250,0.07); border: 1px solid rgba(167,139,250,0.2);
    font-size: 12px; color: var(--c-dim); display: flex; gap: 8px; align-items: flex-start;
    opacity: 0; transition: opacity 0.4s ease 0.8s;
  }
  .speaker-note.visible { opacity: 1; }
  .speaker-note .note-icon { color: var(--c-accent3); flex-shrink: 0; margin-top: 1px; }

  /* ── TWO COLS ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
  .col-card { padding: 20px; border-radius: 12px; background: var(--c-surface); border: 1px solid var(--c-border); }
  .col-card-title { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* ── CODE BLOCK ── */
  .code-block {
    background: #010810; border: 1px solid var(--c-border); border-radius: 10px;
    padding: 18px 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: #a6e3a1; overflow-x: auto; margin-top: 16px;
    border-left: 3px solid var(--c-accent);
  }
  .code-block .cmd { color: var(--c-accent); }
  .code-block .comment { color: var(--c-dim); }
  .code-block .out { color: #f9e2af; }

  /* ── DIAGRAM ── */
  .diagram-box { background: var(--c-surface); border: 1px solid var(--c-border); border-radius: 12px; padding: 24px; margin-top: 16px; }
  .flow-row { display: flex; align-items: center; gap: 0; flex-wrap: wrap; justify-content: center; }
  .flow-node {
    padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; white-space: nowrap;
    border: 1px solid;
  }
  .flow-arrow { color: var(--c-dim); font-size: 20px; padding: 0 8px; }
  .node-blue { background: rgba(0,200,255,0.12); border-color: rgba(0,200,255,0.4); color: var(--c-accent); }
  .node-orange { background: rgba(255,107,53,0.12); border-color: rgba(255,107,53,0.4); color: var(--c-accent2); }
  .node-green { background: rgba(16,217,160,0.12); border-color: rgba(16,217,160,0.4); color: var(--c-green); }
  .node-purple { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.4); color: var(--c-accent3); }
  .node-red { background: rgba(255,71,87,0.12); border-color: rgba(255,71,87,0.4); color: var(--c-red); }

  /* ── OSI STACK ── */
  .osi-layer {
    display: flex; align-items: center; gap: 14px; padding: 10px 16px; border-radius: 8px;
    margin-bottom: 6px; border: 1px solid transparent; transition: all 0.2s;
  }
  .osi-layer:hover { background: rgba(255,255,255,0.03); border-color: var(--c-border); }
  .osi-num { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .osi-name { font-weight: 700; font-size: 14px; width: 130px; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .osi-desc { font-size: 13px; color: var(--c-dim); flex: 1; }
  .osi-pdu { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.05); color: var(--c-dim); }

  /* ── SECTION DIVIDER SLIDE ── */
  .divider-slide { justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden; }
  .divider-num { font-family: 'Syne', sans-serif; font-size: clamp(100px, 20vw, 200px); font-weight: 800; color: rgba(0,200,255,0.04); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; line-height: 1; user-select: none; }
  .divider-content { position: relative; z-index: 1; }
  .divider-line { width: 60px; height: 3px; background: var(--c-accent); margin: 20px auto; border-radius: 2px; }

  /* ── CALLOUT ── */
  .callout { padding: 14px 18px; border-radius: 10px; margin-top: 14px; display: flex; gap: 12px; align-items: flex-start; font-size: 14px; border: 1px solid; }
  .callout-blue { background: rgba(0,200,255,0.07); border-color: rgba(0,200,255,0.25); }
  .callout-red { background: rgba(255,71,87,0.08); border-color: rgba(255,71,87,0.3); }
  .callout-green { background: rgba(16,217,160,0.07); border-color: rgba(16,217,160,0.25); }
  .callout-yellow { background: rgba(255,211,42,0.07); border-color: rgba(255,211,42,0.25); color: var(--c-yellow); }

  /* ── TITLE SLIDE ── */
  .hero-slide { justify-content: center; align-items: center; text-align: center; }
  .hero-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(36px, 6vw, 72px); line-height: 1.1; color: #fff; margin-bottom: 16px; }
  .hero-title .accent { color: var(--c-accent); }
  .hero-sub { font-size: clamp(16px, 2vw, 22px); color: var(--c-dim); margin-bottom: 36px; }
  .hero-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .hero-badge-item { padding: 8px 20px; border-radius: 24px; border: 1px solid var(--c-border); background: var(--c-surface); font-size: 13px; color: var(--c-dim); }

  /* ── TOPOLOGY CARDS ── */
  .topo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-top: 16px; }
  .topo-card { padding: 16px; border-radius: 10px; background: var(--c-surface); border: 1px solid var(--c-border); text-align: center; transition: all 0.2s; }
  .topo-card:hover { border-color: var(--c-accent); transform: translateY(-2px); }
  .topo-icon { font-size: 28px; margin-bottom: 8px; }
  .topo-name { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: var(--c-accent); margin-bottom: 4px; }
  .topo-desc { font-size: 12px; color: var(--c-dim); }

  /* ── COMPARISON TABLE ── */
  .comp-table { width: 100%; border-collapse: separate; border-spacing: 0; border-radius: 10px; overflow: hidden; margin-top: 16px; }
  .comp-table th { background: var(--c-surface2); padding: 12px 16px; font-size: 12px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 1px; color: var(--c-dim); text-align: left; border-bottom: 1px solid var(--c-border); }
  .comp-table td { padding: 11px 16px; font-size: 13px; background: var(--c-surface); border-bottom: 1px solid var(--c-border); }
  .comp-table tr:last-child td { border-bottom: none; }
  .comp-table td:first-child { font-family: 'JetBrains Mono', monospace; color: var(--c-accent); font-weight: 700; }
  .tcp-col { color: var(--c-green); }
  .udp-col { color: var(--c-accent2); }

  /* ── AGENDA ITEMS ── */
  .agenda-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
  .agenda-card { padding: 18px; border-radius: 10px; background: var(--c-surface); border: 1px solid var(--c-border); display: flex; gap: 12px; align-items: flex-start; transition: all 0.2s; }
  .agenda-card:hover { border-color: var(--c-accent); }
  .agenda-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; color: rgba(0,200,255,0.2); flex-shrink: 0; line-height: 1; }
  .agenda-text h4 { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .agenda-text p { font-size: 11px; color: var(--c-dim); }

  /* ── ROADMAP ── */
  .roadmap { display: flex; flex-direction: column; gap: 12px; }
  .roadmap-row { display: flex; gap: 16px; align-items: flex-start; }
  .roadmap-line { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .roadmap-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--c-accent); background: var(--c-bg); flex-shrink: 0; }
  .roadmap-stem { width: 2px; flex: 1; background: var(--c-border); min-height: 20px; }
  .roadmap-card { flex: 1; padding: 12px 16px; border-radius: 8px; background: var(--c-surface); border: 1px solid var(--c-border); }
  .roadmap-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--c-dim); margin-bottom: 4px; }
  .roadmap-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .roadmap-items { font-size: 12px; color: var(--c-dim); }

  /* ── Q&A SLIDE ── */
  .qa-center { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; }
  .qa-icon { font-size: 80px; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

  /* ── GLOWING ORBS ── */
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; opacity: 0.12; }
  .orb1 { width: 400px; height: 400px; background: var(--c-accent); top: -100px; right: -100px; }
  .orb2 { width: 300px; height: 300px; background: var(--c-accent3); bottom: -80px; left: -80px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--c-border); border-radius: 2px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.6s ease forwards; }
  .delay-1 { animation-delay: 0.1s; opacity:0; }
  .delay-2 { animation-delay: 0.2s; opacity:0; }
  .delay-3 { animation-delay: 0.3s; opacity:0; }
  .delay-4 { animation-delay: 0.4s; opacity:0; }

  .kbd { display: inline-block; padding: 2px 8px; border-radius: 4px; background: var(--c-surface2); border: 1px solid var(--c-border); font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--c-dim); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="grid-bg"></div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">NetSec · 2024</div>
  <div style="display:flex;gap:16px;align-items:center;">
    <span style="font-size:11px;color:var(--c-dim);">
      <span class="kbd">←</span> <span class="kbd">→</span> للتنقل
    </span>
    <div class="slide-counter">Slide <span id="cur">1</span> / <span id="tot">1</span></div>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-bar" id="progress" style="width:0%"></div>
</div>

<!-- SLIDES DECK -->
<div id="deck"></div>

<!-- BOTTOM NAV -->
<div class="bottomnav">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>← السابق</button>
  <div class="dot-nav" id="dotNav"></div>
  <button class="nav-btn primary" id="nextBtn" onclick="navigate(1)">التالي →</button>
</div>

<script>
const slides = [
  // ── SLIDE 1: TITLE ──
  {
    type: 'hero',
    badge: null,
    content: `
      <div class="hero-slide slide-inner">
        <div style="position:relative;z-index:1;">
          <div class="section-badge badge-blue fade-up delay-1">● ITI · Computer Networks</div>
          <h1 class="hero-title fade-up delay-2">
            Computer Networks<br>&amp; <span class="accent">Cybersecurity</span>
          </h1>
          <p class="hero-sub fade-up delay-3">من الأساسيات لحد الـ Security Mindset</p>
          <div class="hero-badges fade-up delay-4">
            <div class="hero-badge-item">🕐 1.5 – 2 ساعات</div>
            <div class="hero-badge-item">📊 38 Slides</div>
            <div class="hero-badge-item">🔒 Security Integrated</div>
            <div class="hero-badge-item">🎯 Beginner → Intermediate</div>
          </div>
        </div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;">
          <div style="font-family:'Syne',sans-serif;font-size:clamp(120px,25vw,240px);font-weight:800;color:rgba(0,200,255,0.03);line-height:1;user-select:none;">NET</div>
        </div>
      </div>
    `,
    note: 'Prepared by: Mohamed AboSehly — ITI'
  },

  // ── SLIDE 2: AGENDA ──
  {
    type: 'standard',
    badge: { text: 'Agenda', color: 'badge-blue' },
    title: 'What We\'ll Cover <span class="hl">Today</span>',
    subtitle: 'رحلة من الأساسيات لحد Security Mindset',
    content: `
      <div class="agenda-grid">
        ${[
          ['01','Network Foundations','تعريف، عناصر، وتصنيفات الشبكات'],
          ['02','Network Topologies','أشكال توصيل الأجهزة — Bus, Star, Mesh'],
          ['03','OSI & TCP/IP','الـ 7 Layers — كل layer بتعمل إيه'],
          ['04','IP Addressing','Private vs Public, NAT, DHCP, ARP'],
          ['05','Transport Layer','TCP vs UDP, Ports, Handshake'],
          ['06','App Protocols','HTTP, DNS, FTP, SMTP, SSH, RDP'],
          ['07','Network Devices','Hub, Switch, Router — الفرق والدور'],
          ['08','Security View','الهجمات المبنية على كل مفهوم'],
        ].map(([n,h,p])=>`
          <div class="agenda-card fade-up">
            <div class="agenda-num">${n}</div>
            <div class="agenda-text"><h4>${h}</h4><p>${p}</p></div>
          </div>
        `).join('')}
      </div>
    `,
    note: 'اشرح الـ agenda بسرعة — خلّي الناس تعرف إنهم هيمشوا من الأساسيات للـ Security mindset.'
  },

  // ── SLIDE 3: SECTION DIVIDER ──
  {
    type: 'divider',
    num: '01',
    title: 'Network Foundations',
    subtitle: 'ما هي الشبكة؟ ولماذا نبنيها؟',
    color: 'var(--c-accent)'
  },

  // ── SLIDE 4: WHAT IS A NETWORK ──

// ── HELPER ──
function mkBullets(items) {
  const icons = {'blue':'◆','green':'◆','orange':'◆','red':'◆','purple':'◆'};
  return items.map(([emoji, color, text, _])=>`
    <div class="bullet-item">
      <div class="bullet-icon icon-${color}">${emoji}</div>
      <div class="bullet-text">${text}</div>
    </div>
  `).join('');
}

// ── STATE ──
let current = 0;

// ── RENDER ──
function renderSlides() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  slides.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'slide' + (i === 0 ? ' active' : '');
    div.id = `slide-${i}`;

    if (s.type === 'divider') {
      div.innerHTML = `
        <div class="slide-inner divider-slide" style="flex:1;">
          <div class="divider-num">${s.num}</div>
          <div class="divider-content">
            <div class="section-badge badge-blue" style="margin:0 auto 16px;">Section ${s.num}</div>
            <div class="divider-line" style="background:${s.color};"></div>
            <h2 class="hero-title" style="font-size:clamp(32px,5vw,56px);margin-bottom:12px;">${s.title}</h2>
            <p style="color:var(--c-dim);font-size:17px;">${s.subtitle}</p>
          </div>
        </div>
      `;
    } else if (s.type === 'hero') {
      div.innerHTML = s.content;
    } else {
      div.innerHTML = `
        <div class="slide-inner">
          ${s.badge ? `<div class="section-badge ${s.badge.color}">${s.badge.text}</div>` : ''}
          <h2 class="slide-title">${s.title}</h2>
          ${s.subtitle ? `<p class="slide-subtitle">${s.subtitle}</p>` : ''}
          ${s.content}
          ${s.note ? `
            <div class="speaker-note" id="note-${i}">
              <span class="note-icon">🎙️</span>
              <span><strong>Speaker:</strong> ${s.note}</span>
            </div>
          ` : ''}
        </div>
      `;
    }
    deck.appendChild(div);
  });

  document.getElementById('tot').textContent = slides.length;
  buildDots();
  updateUI();
}

function buildDots() {
  const nav = document.getElementById('dotNav');
  nav.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goTo(i);
    nav.appendChild(d);
  });
}

function updateUI() {
  document.getElementById('cur').textContent = current + 1;
  const pct = slides.length > 1 ? (current / (slides.length - 1)) * 100 : 0;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === slides.length - 1;
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
}

function goTo(idx) {
  if (idx === current) return;
  const prev = document.getElementById(`slide-${current}`);
  const next = document.getElementById(`slide-${idx}`);

  if (prev) {
    prev.classList.remove('active');
    
    // التعديل هنا: مسح الـ inline styles عشان السلايد القديم يختفي ويرجع لخصائص الـ CSS الأصلية
    prev.style.opacity = '';
    prev.style.transform = '';
    prev.style.transition = '';

    // تحديد اتجاه الخروج
    if (idx > current) {
      prev.classList.add('exit-left');
      setTimeout(() => prev.classList.remove('exit-left'), 400);
    }
  }

  if (next) {
    next.style.transform = idx > current ? 'translateX(60px)' : 'translateX(-60px)';
    next.style.opacity = '0';
    next.classList.add('active');
    requestAnimationFrame(() => {
      next.style.transition = 'opacity 0.5s cubic-bezier(.4,0,.2,1), transform 0.5s cubic-bezier(.4,0,.2,1)';
      next.style.transform = 'translateX(0)';
      next.style.opacity = '1';
    });

    // Stagger bullets
    setTimeout(() => {
      const bullets = next.querySelectorAll('.bullet-item');
      bullets.forEach((b, bi) => {
        setTimeout(() => b.classList.add('visible'), bi * 100);
      });
      const note = next.querySelector('.speaker-note');
      if (note) note.classList.add('visible');
      const fadeUps = next.querySelectorAll('.fade-up');
      fadeUps.forEach(el => { el.style.animationPlayState = 'running'; });
    }, 80);
  }

  current = idx;
  updateUI();
}
function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < slides.length) goTo(next);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') navigate(1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End') goTo(slides.length - 1);
});

// Touch swipe
let touchX = 0;
document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
document.addEventListener('touchend', e => {
  const dx = touchX - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 50) navigate(dx > 0 ? 1 : -1);
});

// Init
renderSlides();
// Trigger bullets for first slide
setTimeout(() => {
  const first = document.getElementById('slide-0');
  if (first) {
    first.querySelectorAll('.bullet-item').forEach((b, i) => {
      setTimeout(() => b.classList.add('visible'), i * 100);
    });
    const note = first.querySelector('.speaker-note');
    if (note) note.classList.add('visible');
  }
}, 300);
</script>
